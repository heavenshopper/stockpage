<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>HEAVEN SHOPPER</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
</head>
<body>

<div class="contact-overlay" id="contactOverlay"></div>

<div class="contact-menu" id="contactMenu">
  <div class="menu-arrow"></div>
  <div class="menu-header">
    <h3>ช่องทางติดต่อ</h3>
    <p>เลือกช่องทางที่สะดวกสำหรับคุณ</p>
  </div>
  <div class="contact-list">
    <a class="contact-item messenger" href="#" onclick="openMessenger(event)">
      <div class="contact-icon"><i class="fab fa-facebook-messenger"></i></div>
      <div class="contact-info">
        <div class="contact-title">Facebook Messenger</div>
        <div class="contact-subtitle">ส่งข้อความหาเราผ่าน Messenger</div>
      </div>
    </a>
  </div>
</div>

<button class="fab-main" id="fabMain" onclick="toggleContactMenu()">
  <i class="fas fa-comment" id="fabIcon"></i>
</button>

<div class="header">
  <div class="header-inner">
    <h1 class="site-header">
      <img class="logo-img" src="https://drive.google.com/thumbnail?id=1HGxfThUV4U5VxnmLAngTf5VqICV5ZV1l"/>
      <span>HEAVEN SHOPPER STOCK</span>
    </h1>

    <div class="category-menu">
      <button class="category-btn active" data-category="all">📦 รวมสินค้า</button>
      <button class="category-btn" data-category="new">🎉 สินค้าเข้าใหม่!</button>
      <button class="category-btn" data-category="promotion">🔥 โปรโมชั่น</button>
      <button class="category-btn" data-category="common">🔖 ทั่วไป</button>
      <button class="category-btn" data-category="gaming">🎮 เกมมิ่ง</button>
      <button class="category-btn" data-category="gadget it">📱 ไอที</button>
      <button class="category-btn" data-category="motorcycle/car parts">🚗 อะไหล่รถ</button>
      <button class="category-btn" data-category="sport">⚽ กีฬา</button>
      <button class="category-btn" data-category="music equipment">🎸 ดนตรี</button>
    </div>

    <!-- NEW: tools bar -->
    <div class="tools-bar">
      <input id="searchInput" type="text" placeholder="ค้นหาชื่อสินค้า..." />
      <select id="priceSort">
        <option value="">เรียงราคา</option>
        <option value="asc">น้อย → มาก</option>
        <option value="desc">มาก → น้อย</option>
      </select>
      <div class="last-update">อัปเดตล่าสุด: <span id="lastUpdate">04 ก.พ. 2026</span></div>
    </div>

  </div>
</div>

<div class="menu-grid" id="menu-container">
  <div class="loading">กำลังโหลดสินค้า...</div>
</div>

<div class="preview-modal" id="preview-modal">
  <button class="close-modal">×</button>
  <div class="zoom-wrap">
    <img id="zoom-img"/>
  </div>
</div>

<script src="https://www.gstatic.com/charts/loader.js"></script>
<script src="script.js"></script>
</body>
</html>
